<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Best Moments of Us</title>
    <meta name="description" content="Our best moments together">
    <link rel="stylesheet" href="style.css" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@200;300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Background Music & Toggle -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    <button id="music-toggle" class="music-btn" aria-label="Toggle music">
        <svg id="music-icon-play" class="music-icon" fill="currentColor" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z" />
        </svg>
        <svg id="music-icon-pause" class="music-icon hidden" fill="currentColor" viewBox="0 0 24 24">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
    </button>
    <button id="mood-toggle" class="mood-btn" aria-label="Toggle mood">
        <svg class="mood-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
            </path>
        </svg>
    </button>

    <!-- Main Content -->
    <main id="main-content" class="main-hidden">

        <!-- Back Link -->
        <a href="index.html" class="back-link">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
            Home
        </a>

        <!-- Hero -->
        <div class="subpage-hero">
            <div class="subpage-hero-line"></div>
            <h1 class="subpage-hero-title">Our best moments</h1>
            <p class="subpage-hero-desc">These are the moments we enjoyed together,<br>and many more to come…</p>
        </div>

        <!-- Cinematic Story Carousel -->
        <section class="story-carousel" id="story-carousel">

            <div class="story-stage">
                <!-- Left arrow -->
                <button class="story-arrow story-arrow-left" id="story-prev" aria-label="Previous">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>

                <!-- The 3 visible slots -->
                <div class="story-track" id="story-track">
                    <!-- Dynamically managed by JS -->
                </div>

                <!-- Right arrow -->
                <button class="story-arrow story-arrow-right" id="story-next" aria-label="Next">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
            </div>

            <!-- Caption area -->
            <div class="story-caption" id="story-caption"></div>

            <!-- Progress dots -->
            <div class="story-dots" id="story-dots"></div>

        </section>

    </main>

    <!-- Image data for JS -->
    <script>
        window.STORY_SLIDES = [
            { src: "BestMoments/20260109_215506(2)(1).jpg", caption: "First picture together… didn’t know it would mean this much." },
            { src: "BestMoments/20260320_223655.jpg", caption: "I was trying to look better than you… didn’t work." },
            { src: "BestMoments/20260322_223158.jpg", caption: "This is the exact moment I knew I was gone." },
            { src: "BestMoments/20260322_223408.jpg", caption: "You were more excited than the flowers." },
            { src: "BestMoments/IMG-20260319-WA0038.jpg", caption: "And you still say this isn’t a good picture." },
            { src: "BestMoments/IMG-20260319-WA0082.jpg", caption: "Somewhere here… this started feeling real." },
            { src: "BestMoments/IMG-20260326-WA0080.jpg", caption: "We were probably fighting… as usual." },
            { src: "BestMoments/IMG-20260326-WA0097.jpg", caption: "Just… don’t let go like this." },
            { src: "BestMoments/IMG-20260326-WA0110.jpg", caption: "You’ll still say this isn’t your best picture." },
            { src: "BestMoments/Picsart_26-03-25_13-29-59-468(1).jpg", caption: "Yeah… this one’s definitely staying forever." }
        ];
    </script>

    <!-- Scripts -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
