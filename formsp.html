<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Form</title>
  <style>
    input{
      border: none;
      outline: none;
      border-bottom: 1px solid;
    }
  </style>
</head>
<body>


  <h1>Sports Physical Form</h1>

  <fieldset>
    
    <legend>Athelete Informations</legend>
  <ul>
    <li>
      <label for="fname"> Name:</label>
      <input type="text" id="fname" name="fname">
    </li>
    <li>
      <label for="sch"> School: </label>
      <input type="text" id="sch" name="sch">
    </li>
    <li>
      <label for="spt"> Sport:</label>
      <input type="text" id="spt" name="spt">
    </li>
    <li>
      <label for="gd"> Guardian</label>
      <input type="text" id="gd" name="gd">
    </li>
    
  </ul>
  

  </fieldset>


  <fieldset>
    
    <legend>Medical information: </legend>
  <ul>
    <li>
      <label for="hos"> History of counssions</label>
      <input type="radio" id="hos" name="hos">
      <label for="yes">Yes</label>
      <input type="radio" id="hos" name="hos">
      <label for="no">No</label>
    </li>
    <li>
      <label for="sug"> previous Suggestions: </label>
      <input type="text" id="sug" name="sug">
    </li>
    <li>
      <label for="abf"> Any Bone Fractures: </label>
      <input type="radio" id="abf" name="abf">
      <label for="yes">Yes</label>
      <input type="radio" id="abf" name="abf">
      <label for="no">No</label>
    </li>
    <li>
      <label for="ast"> Asthama Or Breathing Problem</label>
      <input type="radio" id="ast" name="ast">
      <label for="yes">Yes</label>
      <input type="radio" id="ast" name="ast">
      <label for="no">No</label>
    </li>
    
  </ul>
  

  </fieldset>



  
</body>
</html>
