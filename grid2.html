<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background-color: #11154a;
      font-family: Arial, Helvetica, sans-serif;
    }

    .dashboard {
      width: min(96vw, 980px);
      aspect-ratio: 4 / 3;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 1fr 1fr 1fr;
      gap: 14px;
      background-color: #10184a;
      border: 4px solid #10184a;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      color: #dff9ff;
      background-color: #3d32a4;
    }

    .apps {
      padding: 22px 18px;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 34px;
      font-size: 11px;
      font-weight: 800;
    }

    .launch {
      border: 0;
      border-radius: 999px;
      padding: 7px 14px;
      color: #dff9ff;
      background: rgba(132, 88, 255, 0.78);
      font-size: 10px;
      font-weight: 800;
    }

    .icons {
      display: grid;
      grid-template-columns: repeat(5, 58px);
      gap: 15px;
      transform: translateX(-30px);
    }

    .icon {
      width: 58px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background-color: #872dff;
      font-size: 29px;
      font-weight: 900;
    }

    .stat {
      display: grid;
      place-items: center;
      text-align: center;
    }

    .stat span {
      display: block;
      font-size: clamp(54px, 8vw, 86px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0;
    }

    .stat small {
      display: block;
      margin-top: 20px;
      font-size: 14px;
      font-weight: 900;
    }

    .live {
      position: absolute;
      top: 30px;
      right: 20px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #ff4e83;
      color: white;
      font-size: 10px;
      font-weight: 900;
    }

    .users {
      padding: 28px 30px;
    }

    .users h2,
    .subscribers h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
    }

    .gain {
      position: absolute;
      top: 28px;
      right: 28px;
      color: #7bf9ff;
      font-size: 13px;
      font-weight: 900;
    }

    .users strong {
      position: absolute;
      left: 30px;
      bottom: 42px;
      font-size: clamp(56px, 8vw, 86px);
      line-height: 0.9;
      font-weight: 900;
    }

    .pattern {
      display: grid;
      place-items: center;
      background-color: #7829ee;
    }

    .pattern strong {
      z-index: 1;
      color: #f4ffff;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(28px, 4vw, 42px);
    }

    .learn {
      grid-column: 1 / span 2;
      padding: 36px 32px;
      background-color: #372c99;
    }

    .learn p {
      width: min(420px, 75%);
      margin: 0;
      font-size: clamp(20px, 2.5vw, 26px);
      line-height: 1.05;
      font-weight: 900;
    }

    .subscribers {
      grid-column: 3;
      grid-row: 2 / span 2;
      padding: 36px 34px;
      color: #202145;
      background-color: #d8f8ff;
    }

    .subscribers .gain {
      color: #8dd6e9;
    }

    .subscribers strong {
      position: absolute;
      left: 34px;
      bottom: 50px;
      font-size: clamp(64px, 9vw, 98px);
      line-height: 0.9;
      font-weight: 500;
      letter-spacing: 0;
    }

    @media (max-width: 700px) {
      body {
        align-items: start;
        padding: 16px;
      }

      .dashboard {
        width: min(100%, 430px);
        height: auto;
        aspect-ratio: auto;
        grid-template-columns: 1fr;
        grid-template-rows: repeat(6, 170px);
      }

      .learn,
      .subscribers {
        grid-column: auto;
        grid-row: auto;
      }

      .subscribers {
        min-height: 320px;
      }
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <section class="card apps">
      <div class="top-row">
        <span>A complete family of Apps</span>
        <button class="launch">Launch Apps -></button>
      </div>
      <div class="icons">
        <div class="icon">in</div>
        <div class="icon">&#9658;</div>
        <div class="icon">t</div>
        <div class="icon">&#9834;</div>
        <div class="icon">f</div>
      </div>
    </section>

    <section class="card stat">
      <div>
        <span>25K</span>
        <small>Weekly Likes</small>
      </div>
    </section>

    <section class="card stat">
      <b class="live">LIVE</b>
      <div>
        <span>50K</span>
        <small>Weekly Viewers</small>
      </div>
    </section>

    <section class="card users">
      <h2>Active Users</h2>
      <span class="gain">+154</span>
      <strong>1,538</strong>
    </section>

    <section class="card pattern">
      <strong>DESIGN</strong>
    </section>

    <section class="card subscribers">
      <h2>Total Subscribers</h2>
      <span class="gain">+7%</span>
      <strong>200K</strong>
    </section>

    <section class="card learn">
      <p>A place to learn UI Design &amp; Web Design.</p>
    </section>
  </main>
</body>
</html>
